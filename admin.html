<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifafa Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d1a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            margin-bottom: 25px;
            border-bottom: 1px solid #2a2a4a;
        }
        .header h1 { font-size: 22px; color: #a78bfa; }
        .header span { font-size: 13px; color: #888; }

        .login-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 35px 25px;
            max-width: 400px;
            margin: 80px auto 0;
            text-align: center;
        }
        .login-icon { font-size: 50px; margin-bottom: 15px; }
        .login-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .login-sub { font-size: 13px; color: #888; margin-bottom: 25px; }

        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 16px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .card-title {
            font-size: 15px; font-weight: 700;
            color: #a78bfa; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }

        .input-group { margin-bottom: 12px; }
        .input-label {
            font-size: 12px; color: #888;
            margin-bottom: 6px; display: block;
        }
        .input-field {
            width: 100%; padding: 12px 14px;
            border-radius: 10px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            color: #fff; font-size: 14px; outline: none;
            transition: border 0.2s;
        }
        .input-field:focus { border-color: #6c63ff; }
        select.input-field { cursor: pointer; }

        .channel-row {
            display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
        }
        .channel-row .input-field { flex: 1; }
        .remove-btn {
            padding: 10px 14px; border: none; border-radius: 8px;
            background: rgba(255,50,50,0.15); color: #ff4444;
            cursor: pointer; font-size: 16px; flex-shrink: 0;
        }
        .add-ch-btn {
            width: 100%; padding: 10px; border: none; border-radius: 8px;
            background: rgba(108,99,255,0.15); color: #a78bfa;
            cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 4px;
        }

        .btn {
            width: 100%; padding: 14px; border: none;
            border-radius: 12px; font-size: 15px; font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            color: #fff; transition: opacity 0.2s; margin-top: 5px;
        }
        .btn:active { opacity: 0.8; }
        .btn-outline {
            background: transparent;
            border: 1px solid #6c63ff;
            color: #a78bfa;
        }

        .badge {
            display: inline-block; padding: 4px 10px;
            border-radius: 20px; font-size: 11px; font-weight: 700;
        }
        .badge-purple { background: rgba(108,99,255,0.2); color: #a78bfa; }
        .badge-green { background: rgba(0,200,100,0.15); color: #00c864; }
        .badge-red { background: rgba(255,50,50,0.15); color: #ff4444; }

        .preview-box {
            background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(167,139,250,0.15));
            border: 1px solid rgba(108,99,255,0.3);
            border-radius: 12px; padding: 16px; margin-top: 12px;
        }
        .preview-label { font-size: 11px; color: #888; margin-bottom: 6px; }
        .preview-value { font-size: 16px; font-weight: 700; color: #a78bfa; word-break: break-all; }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #00c864; color: #fff; padding: 12px 24px;
            border-radius: 30px; font-size: 14px; font-weight: 700;
            opacity: 0; transition: opacity 0.3s; z-index: 999;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: #ff4444; }

        .stat-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 16px;
        }
        .stat-box {
            background: #0f0f1a; border-radius: 12px;
            padding: 16px; text-align: center;
        }
        .stat-num { font-size: 26px; font-weight: 800; color: #a78bfa; }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

        .url-box {
            background: #0f0f1a; border-radius: 10px;
            padding: 12px 14px; font-size: 12px; color: #888;
            word-break: break-all; margin-top: 8px;
        }
        .url-box span { color: #a78bfa; }

        .copy-url-btn {
            width: 100%; padding: 10px; border: none;
            border-radius: 8px; background: rgba(108,99,255,0.15);
            color: #a78bfa; cursor: pointer; font-size: 13px;
            font-weight: 600; margin-top: 6px;
        }

        .loader {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loginSection { display: block; }
        #mainSection { display: none; }
    </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Login Section -->
<div id="loginSection">
    <div class="login-card">
        <div class="login-icon">🔐</div>
        <div class="login-title">Admin Login</div>
        <div class="login-sub">Lifafa Admin Panel</div>

        <div class="input-group">
            <label class="input-label">Bot ID</label>
            <input class="input-field" id="loginBotId" placeholder="e.g. uniod">
        </div>
        <div class="input-group">
            <label class="input-label">Admin Key</label>
            <input class="input-field" type="password" id="loginKey" placeholder="Admin key daalo">
        </div>
        <button class="btn" onclick="doLogin()">🔓 Login</button>
    </div>
</div>

<!-- Main Admin Section -->
<div id="mainSection">
    <div class="header">
        <h1>⚙️ Lifafa Admin</h1>
        <span id="headerBotId" class="badge badge-purple">-</span>
    </div>

    <!-- Stats -->
    <div class="card">
        <div class="card-title">📊 Stats</div>
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-num" id="statClaims">-</div>
                <div class="stat-label">Total Claims</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="statChannels">-</div>
                <div class="stat-label">Channels</div>
            </div>
        </div>
    </div>

    <!-- Channels -->
    <div class="card">
        <div class="card-title">📢 Force Join Channels</div>
        <div id="channelInputs"></div>
        <button class="add-ch-btn" onclick="addChannel()">+ Add Channel</button>
        <button class="btn" onclick="saveChannels()" style="margin-top:12px;">💾 Save Channels</button>
    </div>

    <!-- Reward -->
    <div class="card">
        <div class="card-title">🎁 Reward Settings</div>

        <div class="input-group">
            <label class="input-label">Reward Type</label>
            <select class="input-field" id="rewardType" onchange="updatePreview()">
                <option value="code">🎟️ Gift Code</option>
                <option value="link">🔗 Link</option>
                <option value="text">📝 Custom Text</option>
            </select>
        </div>

        <div class="input-group">
            <label class="input-label">Reward Title</label>
            <input class="input-field" id="rewardTitle" placeholder="e.g. Your Gift Code" oninput="updatePreview()">
        </div>

        <div class="input-group">
            <label class="input-label">Reward Value</label>
            <input class="input-field" id="rewardValue" placeholder="Code, link ya text daalo" oninput="updatePreview()">
        </div>

        <div class="preview-box">
            <div class="preview-label">Preview:</div>
            <div class="preview-value" id="previewValue">-</div>
        </div>

        <button class="btn" onclick="saveReward()" style="margin-top:12px;">💾 Save Reward</button>
    </div>

    <!-- User URL -->
    <div class="card">
        <div class="card-title">🔗 Share URL</div>
        <div class="input-label">User ke liye URL:</div>
        <div class="url-box" id="userUrl">-</div>
        <button class="copy-url-btn" onclick="copyUrl('user')">📋 Copy User URL</button>

        <div class="input-label" style="margin-top:12px;">Admin panel URL:</div>
        <div class="url-box" id="adminUrl">-</div>
        <button class="copy-url-btn" onclick="copyUrl('admin')">📋 Copy Admin URL</button>
    </div>

    <!-- Reset -->
    <div class="card">
        <div class="card-title">⚠️ Danger Zone</div>
        <button class="btn btn-outline" onclick="resetClaims()">🗑️ Reset All Claims</button>
    </div>
</div>

<script>
    var currentBotId = "";
    var currentKey = "";
    var chCount = 0;

    // Auto login from URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("key") && urlParams.get("botid")) {
        document.getElementById("loginKey").value = urlParams.get("key");
        document.getElementById("loginBotId").value = urlParams.get("botid");
        doLogin();
    }

    async function doLogin() {
        const key = document.getElementById("loginKey").value.trim();
        const botid = document.getElementById("loginBotId").value.trim();

        if (!key || !botid) {
            showToast("❌ Key aur Bot ID daalo!", true);
            return;
        }

        try {
            const resp = await fetch("/api/admin?key=" + key + "&botid=" + botid + "&action=get");
            const data = await resp.json();

            if (data.error === "Unauthorized") {
                showToast("❌ Wrong admin key!", true);
                return;
            }

            currentKey = key;
            currentBotId = botid;

            document.getElementById("loginSection").style.display = "none";
            document.getElementById("mainSection").style.display = "block";
            document.getElementById("headerBotId").textContent = botid;

            loadConfig(data.config || {});
            loadStats();
            generateUrls();

        } catch(e) {
            showToast("❌ Server error!", true);
        }
    }

    function loadConfig(cfg) {
        if (cfg.reward_type) document.getElementById("rewardType").value = cfg.reward_type;
        if (cfg.reward_title) document.getElementById("rewardTitle").value = cfg.reward_title;
        if (cfg.reward_value) document.getElementById("rewardValue").value = cfg.reward_value;

        document.getElementById("channelInputs").innerHTML = "";
        chCount = 0;

        const channels = cfg.channels || [];
        if (channels.length === 0) {
            addChannel();
        } else {
            channels.forEach(function(ch) {
                addChannelWithValues(ch.name, ch.link);
            });
        }

        updatePreview();
    }

    async function loadStats() {
        try {
            const resp = await fetch("/api/admin?key=" + currentKey + "&botid=" + currentBotId + "&action=stats");
            const data = await resp.json();
            document.getElementById("statClaims").textContent = data.claims || 0;
            const cfg = data.config || {};
            document.getElementById("statChannels").textContent = (cfg.channels || []).length;
        } catch(e) {
            document.getElementById("statClaims").textContent = "0";
            document.getElementById("statChannels").textContent = "0";
        }
    }

    function addChannel() {
        addChannelWithValues("", "");
    }

    function addChannelWithValues(name, link) {
        const idx = chCount;
        const div = document.createElement("div");
        div.className = "channel-row";
        div.id = "chRow" + idx;
        div.innerHTML = (
            "<input class='input-field' placeholder='Channel Name' id='chName" + idx + "' value='" + (name || "") + "'>" +
            "<input class='input-field' placeholder='https://t.me/...' id='chLink" + idx + "' value='" + (link || "") + "'>" +
            "<button class='remove-btn' onclick='removeCh(" + idx + ")'>✕</button>"
        );
        document.getElementById("channelInputs").appendChild(div);
        chCount++;
    }

    function removeCh(idx) {
        const row = document.getElementById("chRow" + idx);
        if (row) row.remove();
    }

    async function saveChannels() {
        const channels = [];
        for (let i = 0; i < chCount; i++) {
            const nameEl = document.getElementById("chName" + i);
            const linkEl = document.getElementById("chLink" + i);
            if (nameEl && linkEl && nameEl.value.trim() && linkEl.value.trim()) {
                channels.push({ name: nameEl.value.trim(), link: linkEl.value.trim() });
            }
        }

        try {
            const resp = await fetch("/api/admin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    key: currentKey,
                    botid: currentBotId,
                    action: "set_channels",
                    channels: channels
                })
            });
            const data = await resp.json();
            if (data.success) {
                showToast("✅ Channels saved!");
                document.getElementById("statChannels").textContent = channels.length;
            } else {
                showToast("❌ Error!", true);
            }
        } catch(e) {
            showToast("❌ Server error!", true);
        }
    }

    async function saveReward() {
        const type = document.getElementById("rewardType").value;
        const title = document.getElementById("rewardTitle").value.trim();
        const value = document.getElementById("rewardValue").value.trim();

        if (!value) {
            showToast("❌ Reward value daalo!", true);
            return;
        }

        try {
            const resp = await fetch("/api/admin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    key: currentKey,
                    botid: currentBotId,
                    action: "set_reward",
                    reward_type: type,
                    reward_title: title,
                    reward_value: value
                })
            });
            const data = await resp.json();
            if (data.success) {
                showToast("✅ Reward saved!");
            } else {
                showToast("❌ Error!", true);
            }
        } catch(e) {
            showToast("❌ Server error!", true);
        }
    }

    async function resetClaims() {
        if (!confirm("Sab claims reset ho jayenge! Sure?")) return;
        try {
            const resp = await fetch("/api/admin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    key: currentKey,
                    botid: currentBotId,
                    action: "reset_claims"
                })
            });
            const data = await resp.json();
            if (data.success) {
                showToast("✅ Claims reset!");
                document.getElementById("statClaims").textContent = "0";
            }
        } catch(e) {
            showToast("❌ Error!", true);
        }
    }

    function updatePreview() {
        const val = document.getElementById("rewardValue").value || "-";
        document.getElementById("previewValue").textContent = val;
    }

    function generateUrls() {
        const base = window.location.origin;
        document.getElementById("userUrl").innerHTML = "<span>" + base + "/lifafa.html?botid=" + currentBotId + "&bot=YOUR_BOT_USERNAME</span>";
        document.getElementById("adminUrl").innerHTML = "<span>" + base + "/admin.html?botid=" + currentBotId + "&key=" + currentKey + "</span>";
    }

    function copyUrl(type) {
        const el = document.getElementById(type === "user" ? "userUrl" : "adminUrl");
        const text = el.textContent;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text);
        }
        showToast("✅ URL copied!");
    }

    function showToast(msg, isError) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.className = "toast" + (isError ? " error" : "") + " show";
        setTimeout(function() {
            toast.className = "toast" + (isError ? " error" : "");
        }, 3000);
    }
</script>
</body>
  </html>
