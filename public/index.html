<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIO Secure Verify</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--blue:#2563eb;--red:#dc2626;--gray:#6b7280}
    body{background:#fff;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center}
    .wrap{padding:20px;max-width:300px}
    .loader{width:60px;height:60px;border:4px solid #f3f3f3;border-top:4px solid var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .icon{font-size:50px;display:none;margin-bottom:20px}
    .status{font-size:16px;color:var(--gray)}
    .success-icon{color:var(--blue)}.fail-icon{color:var(--red)}
  </style>
</head>
<body>
<div class="wrap">
  <div id="loader" class="loader"></div>
  <div id="icon" class="icon"></div>
  <div id="msg" class="status">Checking hardware security...</div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  async function getHID() {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl');
    const debug = gl.getExtension('WEBGL_debug_renderer_info');
    const renderer = debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "unknown";
    const traits = [renderer, screen.width+"x"+screen.height, navigator.hardwareConcurrency].join('|');
    const encode = new TextEncoder().encode(traits);
    const hash = await crypto.subtle.digest('SHA-256', encode);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function redirectFail(buser) {
    // 100% working deep link format
    const appLink = `tg://resolve?domain=${buser}&start=verifyidfailed`;
    const webLink = `https://t.me/${buser}?start=verifyidfailed`;

    // Instant redirect after 1.5 seconds
    setTimeout(() => {
        // Method 1: WebApp Official Link Open
        if (tg && tg.openTelegramLink) {
            tg.openTelegramLink(webLink);
        } 
        
        // Method 2: Force redirect for all browsers/apps
        window.location.replace(appLink);

        // Method 3: Closing the webapp to force return to bot
        setTimeout(() => { if(tg) tg.close(); }, 1000);
    }, 1500);
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const bid = params.get('botid'), tid = params.get('tgid'), buser = params.get('botuser');
    const msgEl = document.getElementById('msg'), loadEl = document.getElementById('loader'), iconEl = document.getElementById('icon');

    if(!bid || !tid || !buser) { msgEl.textContent = "Error: Invalid Parameters"; return; }

    const hid = await getHID();
    try {
      const res = await fetch(`/api/check?botid=${bid}&tgid=${tid}&deviceid=${hid}`);
      const data = await res.json();

      loadEl.style.display = 'none';
      iconEl.style.display = 'block';

      if(data.status === "success") {
        iconEl.textContent = "✓"; iconEl.className = "icon success-icon";
        msgEl.textContent = "Verification Successful!";
      } else {
        iconEl.textContent = "✕"; iconEl.className = "icon fail-icon";
        msgEl.textContent = data.message || "Security Alert!";
        redirectFail(buser);
      }
    } catch(e) { msgEl.textContent = "Server Error"; }
  }

  // Pehle hi initialize karo fast load ke liye
  init();
</script>
</body>
</html>
