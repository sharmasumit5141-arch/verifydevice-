<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Verification</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
  margin-bottom: 10px;
}

.status {
  margin-top: 20px;
  font-size: 18px;
}

.success { color: #22c55e; }
.fail { color: #ef4444; }
.loading { color: #38bdf8; }

.loader {
  border: 4px solid #334155;
  border-top: 4px solid #38bdf8;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
  <h1>🔐 Verifying</h1>
  <div class="loader"></div>
  <div class="status loading" id="status">Checking your device...</div>
</div>

<script>
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

const botid = getParam("botid");
const tgid = getParam("tgid");

const statusEl = document.getElementById("status");

if (!botid || !tgid) {
  statusEl.innerHTML = "❌ Invalid Link";
  statusEl.className = "status fail";
} else {

  fetch(`/api/verify?botid=${botid}&tgid=${tgid}`)
    .then(res => res.json())
    .then(data => {

      document.querySelector(".loader").style.display = "none";

      if (data.status === "success") {
        statusEl.innerHTML = `✅ ${data.message}<br><br><small>${data.deviceId}</small>`;
        statusEl.className = "status success";
      } 
      else if (data.status === "fail") {
        statusEl.innerHTML = `❌ ${data.message}`;
        statusEl.className = "status fail";
      } 
      else {
        statusEl.innerHTML = "⚠️ Something went wrong";
        statusEl.className = "status fail";
      }
    })
    .catch(() => {
      document.querySelector(".loader").style.display = "none";
      statusEl.innerHTML = "❌ Server Error";
      statusEl.className = "status fail";
    });
}
</script>

</body>
</html>
