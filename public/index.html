<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Verification</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#050a0f;
  --panel:#080f1a;
  --border:#0d2a3a;
  --accent:#00d4ff;
  --green:#00ff88;
  --red:#ff3355;
  --warn:#ffaa00;
  --text:#c8e8f0;
  --muted:#3a6070;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* Animated grid background */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  animation:gridMove 20s linear infinite;
  pointer-events:none;
}
@keyframes gridMove{to{background-position:40px 40px}}

/* Scanline overlay */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events:none;
  z-index:100;
}

.container{
  width:100%;
  max-width:480px;
  padding:20px;
  position:relative;
  z-index:10;
}

/* Corner decorations */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  position:relative;
  padding:36px 32px;
  clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
}
.card::before,.card::after{
  content:'';
  position:absolute;
  width:12px;height:12px;
  border-color:var(--accent);
  border-style:solid;
}
.card::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

/* Header */
.header{text-align:center;margin-bottom:28px;}

.logo{
  width:64px;height:64px;
  margin:0 auto 16px;
  position:relative;
}
.logo-ring{
  width:64px;height:64px;
  border:2px solid var(--accent);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  animation:rotatePulse 3s ease-in-out infinite;
  position:relative;
}
.logo-ring::before{
  content:'';
  position:absolute;
  inset:6px;
  border:1px solid rgba(0,212,255,0.3);
  border-radius:50%;
}
@keyframes rotatePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,0.4),inset 0 0 20px rgba(0,212,255,0.05)}
  50%{box-shadow:0 0 0 8px rgba(0,212,255,0),inset 0 0 20px rgba(0,212,255,0.1)}
}

.logo-icon{font-size:24px;color:var(--accent);}

.title{
  font-family:'Rajdhani',sans-serif;
  font-size:22px;font-weight:700;
  letter-spacing:3px;
  color:#fff;
  text-transform:uppercase;
}
.subtitle{
  font-size:11px;
  color:var(--muted);
  letter-spacing:2px;
  margin-top:4px;
}

/* Info rows */
.info-grid{
  display:flex;flex-direction:column;
  gap:8px;
  margin-bottom:24px;
}
.info-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 12px;
  background:rgba(0,212,255,0.03);
  border:1px solid var(--border);
  border-left:2px solid var(--accent);
  font-size:12px;
}
.info-label{color:var(--muted);letter-spacing:1px;}
.info-val{
  color:var(--accent);
  font-weight:bold;
  max-width:220px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* Progress steps */
.steps{
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:24px;
}
.step{
  display:flex;align-items:center;gap:10px;
  font-size:12px;
  color:var(--muted);
  transition:color 0.3s;
}
.step.active{color:var(--accent);}
.step.done{color:var(--green);}
.step.fail{color:var(--red);}
.step-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:var(--muted);
  flex-shrink:0;
  transition:background 0.3s,box-shadow 0.3s;
}
.step.active .step-dot{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 1s infinite;}
.step.done .step-dot{background:var(--green);}
.step.fail .step-dot{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Result box */
.result{
  display:none;
  padding:20px;
  text-align:center;
  border:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
.result.show{display:block;}
.result.success{border-color:var(--green);}
.result.fail{border-color:var(--red);}
.result.pending{border-color:var(--warn);}

.result-icon{font-size:36px;margin-bottom:10px;}
.result-title{
  font-family:'Rajdhani',sans-serif;
  font-size:20px;font-weight:700;
  letter-spacing:2px;
  margin-bottom:6px;
}
.result.success .result-title{color:var(--green);}
.result.fail .result-title{color:var(--red);}
.result.pending .result-title{color:var(--warn);}
.result-msg{font-size:12px;color:var(--muted);line-height:1.6;}

/* Scan animation */
.scan-line{
  position:absolute;
  left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  top:0;
  animation:scan 2s linear infinite;
  display:none;
}
.scanning .scan-line{display:block;}
@keyframes scan{0%{top:0}100%{top:100%}}

/* Device ID display */
.device-id-box{
  padding:10px 14px;
  background:rgba(0,255,136,0.04);
  border:1px solid rgba(0,255,136,0.2);
  font-size:11px;
  color:var(--green);
  word-break:break-all;
  line-height:1.6;
  margin-top:10px;
  display:none;
}
.device-id-box.show{display:block;}

.footer-text{
  text-align:center;
  font-size:10px;
  color:var(--muted);
  margin-top:20px;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="container">
  <div class="card" id="mainCard">
    <div class="scan-line" id="scanLine"></div>

    <div class="header">
      <div class="logo">
        <div class="logo-ring">
          <span class="logo-icon">⬡</span>
        </div>
      </div>
      <div class="title">Device Verify</div>
      <div class="subtitle">SECURE · AUTOMATED · TELEGRAM</div>
    </div>

    <div class="info-grid">
      <div class="info-row">
        <span class="info-label">BOT ID</span>
        <span class="info-val" id="showBotId">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">TG ID</span>
        <span class="info-val" id="showTgId">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">DEVICE ID</span>
        <span class="info-val" id="showDeviceId">Generating...</span>
      </div>
      <div class="info-row">
        <span class="info-label">CLIENT IP</span>
        <span class="info-val" id="showIp">Detecting...</span>
      </div>
    </div>

    <div class="steps">
      <div class="step" id="s1">
        <div class="step-dot"></div>
        <span>Extracting URL parameters</span>
      </div>
      <div class="step" id="s2">
        <div class="step-dot"></div>
        <span>Generating device fingerprint</span>
      </div>
      <div class="step" id="s3">
        <div class="step-dot"></div>
        <span>Connecting to verification server</span>
      </div>
      <div class="step" id="s4">
        <div class="step-dot"></div>
        <span>Registering device identity</span>
      </div>
      <div class="step" id="s5">
        <div class="step-dot"></div>
        <span>Finalizing verification</span>
      </div>
    </div>

    <div class="result" id="resultBox">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-msg" id="resultMsg"></div>
      <div class="device-id-box" id="deviceIdBox"></div>
    </div>

    <div class="footer-text">POWERED BY SECURE DEVICE VERIFICATION SYSTEM</div>
  </div>
</div>

<script>
// ── Utility ──────────────────────────────────────────────────────────────────
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { botid: p.get('botid'), tgid: p.get('tgid') };
}

function step(id, state) {
  const el = document.getElementById(id);
  el.className = 'step ' + state;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setScanning(on) {
  document.getElementById('mainCard').classList.toggle('scanning', on);
}

// ── Device Fingerprint ────────────────────────────────────────────────────────
async function generateDeviceId(botid, tgid) {
  const fp = {};

  // Browser signals
  fp.ua        = navigator.userAgent;
  fp.lang      = navigator.language;
  fp.tz        = Intl.DateTimeFormat().resolvedOptions().timeZone;
  fp.screen    = `${screen.width}x${screen.height}x${screen.colorDepth}`;
  fp.cores     = navigator.hardwareConcurrency || 0;
  fp.mem       = navigator.deviceMemory || 0;
  fp.platform  = navigator.platform;
  fp.touch     = navigator.maxTouchPoints;
  fp.plugins   = [...(navigator.plugins || [])].map(p => p.name).join(',');

  // Canvas fingerprint
  try {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#f60';
    ctx.fillRect(125, 1, 62, 20);
    ctx.fillStyle = '#069';
    ctx.fillText('DeviceVerify🔒', 2, 15);
    ctx.fillStyle = 'rgba(102,204,0,0.7)';
    ctx.fillText('DeviceVerify🔒', 4, 17);
    fp.canvas = c.toDataURL().slice(-50);
  } catch(e) { fp.canvas = 'err'; }

  // WebGL fingerprint
  try {
    const gl = document.createElement('canvas').getContext('webgl');
    if (gl) {
      const dbg = gl.getExtension('WEBGL_debug_renderer_info');
      fp.renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : 'n/a';
      fp.vendor   = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)   : 'n/a';
    }
  } catch(e) { fp.renderer = 'err'; }

  // Audio fingerprint
  try {
    const ctx2 = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
    const osc = ctx2.createOscillator();
    const gain = ctx2.createGain();
    osc.connect(gain);
    gain.connect(ctx2.destination);
    osc.start(0);
    const buf = await ctx2.startRendering();
    const arr = buf.getChannelData(0);
    fp.audio = arr.slice(4500, 4510).reduce((a, b) => a + Math.abs(b), 0).toFixed(10);
  } catch(e) { fp.audio = 'err'; }

  // Build raw string and hash it
  const raw = JSON.stringify(fp) + '|' + botid + '|' + tgid;
  const hash = await sha256(raw);
  return { deviceId: hash.slice(0, 32), fingerprint: fp };
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Main Flow ─────────────────────────────────────────────────────────────────
async function run() {
  const { botid, tgid } = getParams();

  document.getElementById('showBotId').textContent = botid || 'MISSING';
  document.getElementById('showTgId').textContent  = tgid  || 'MISSING';

  if (!botid || !tgid) {
    showResult('fail', '✕', 'INVALID LINK', 'Missing botid or tgid in URL parameters.');
    return;
  }

  setScanning(true);

  // Step 1
  step('s1','active'); await sleep(600);
  step('s1','done');

  // Step 2 — generate fingerprint
  step('s2','active');
  const { deviceId, fingerprint } = await generateDeviceId(botid, tgid);
  await sleep(400);
  document.getElementById('showDeviceId').textContent = deviceId;
  step('s2','done');

  // Step 3 — get IP + connect
  step('s3','active');
  let ip = 'unknown';
  try {
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipRes.json();
    ip = ipData.ip;
    document.getElementById('showIp').textContent = ip;
  } catch(e) {
    document.getElementById('showIp').textContent = 'N/A';
  }
  await sleep(400);
  step('s3','done');

  // Step 4 — register
  step('s4','active');
  let regResult;
  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ botid, tgid, deviceId, fingerprint })
    });
    regResult = await res.json();
  } catch(e) {
    setScanning(false);
    step('s4','fail');
    showResult('fail', '✕', 'SERVER ERROR', 'Could not reach verification server. Try again.');
    return;
  }
  await sleep(500);

  if (regResult.status === 'fail') {
    setScanning(false);
    step('s4','fail');
    step('s5','fail');
    showResult('fail', '✕', 'VERIFICATION FAILED',
      'This device is already registered to a different Telegram account.<br>Access denied.',
      deviceId);
    return;
  }

  step('s4','done');

  // Step 5 — finalize
  step('s5','active');
  await sleep(600);
  step('s5','done');
  setScanning(false);

  showResult('success', '✓', 'VERIFIED', 'Device successfully registered and verified.<br>You may now use the bot.', deviceId);
}

function showResult(type, icon, title, msg, deviceId) {
  const box = document.getElementById('resultBox');
  box.className = 'result show ' + type;
  document.getElementById('resultIcon').textContent  = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').innerHTML     = msg;

  if (deviceId) {
    const dbox = document.getElementById('deviceIdBox');
    dbox.textContent = 'DEVICE ID: ' + deviceId;
    dbox.classList.add('show');
  }
}

run();
</script>
</body>
  </html>
