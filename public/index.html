<!DOCTYPE html>
<html>
<head>
  <title>Verify Device</title>
</head>
<body>
<h2>🔐 Verifying...</h2>

<script>
function getParam(name) {
  return new URL(window.location.href).searchParams.get(name);
}

// 🔥 Strong fingerprint
async function generateDeviceId() {
  const data = [
    navigator.userAgent,
    navigator.language,
    screen.width + "x" + screen.height,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.platform,
    navigator.hardwareConcurrency
  ].join("|");

  const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(data));
  const arr = Array.from(new Uint8Array(hash));
  const hex = arr.map(b => b.toString(16).padStart(2, "0")).join("");

  return "DEV-" + hex.slice(0, 16).toUpperCase();
}

// 🔐 get stable deviceId
async function getDeviceId() {
  let id = localStorage.getItem("deviceId");

  if (!id) {
    id = await generateDeviceId();
    localStorage.setItem("deviceId", id);
  }

  return id;
}

(async () => {
  const botid = getParam("botid");
  const tgid = getParam("tgid");
  const username = getParam("username") || "user";

  if (!botid || !tgid) {
    document.body.innerHTML = "❌ Invalid link";
    return;
  }

  const deviceId = await getDeviceId();

  fetch(`/api/verify?botid=${botid}&tgid=${tgid}&username=${username}&deviceid=${deviceId}`)
    .then(res => res.json())
    .then(data => {
      if (data.status === "verified") {
        document.body.innerHTML = "✅ Verified<br>" + deviceId;
      } else {
        document.body.innerHTML = "❌ " + data.message;
      }
    })
    .catch(err => {
      document.body.innerHTML = "❌ Error: " + err.message;
    });
})();
</script>

</body>
</html>
