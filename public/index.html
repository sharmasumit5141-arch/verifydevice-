<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIO Secure Verify</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2563eb; --error: #ef4444; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
    body {
      background: var(--bg); background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #0f172a 100%);
      font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0; color: #fff;
    }
    .card {
      background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
      padding: 40px 30px; border-radius: 24px; width: 90%; max-width: 340px; text-align: center;
    }
    .loader { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon { font-size: 60px; display: none; margin-bottom: 20px; }
    .success { color: #4ade80; } .fail { color: var(--error); }
    .status-text { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
    .sub-text { font-size: 14px; color: #94a3b8; margin-bottom: 30px; line-height: 1.5; }
    .btn {
      display: none; background: var(--primary); color: white; border: none;
      padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; width: 100%; transition: 0.2s;
    }
    .btn-fail { background: var(--error); }
  </style>
</head>
<body>

<div class="card">
  <div id="loader" class="loader"></div>
  <div id="icon" class="icon"></div>
  <div id="status" class="status-text">Scanning Hardware...</div>
  <div id="subtext" class="sub-text">Please wait...</div>
  <button id="actionBtn" class="btn">Continue to Bot</button>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  async function getHID() {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl');
    const debug = gl.getExtension('WEBGL_debug_renderer_info');
    const renderer = debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "unknown";
    const traits = [renderer, screen.width+"x"+screen.height, navigator.hardwareConcurrency].join('|');
    const encode = new TextEncoder().encode(traits);
    const hash = await crypto.subtle.digest('SHA-256', encode);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function setupButton(type, buser) {
    const btn = document.getElementById('actionBtn');
    btn.style.display = 'block';
    
    // Yahan payload logic change kar di hai
    const payload = (type === 'success') ? 'check' : 'verifyidfailed';
    const deepLink = `tg://resolve?domain=${buser}&start=${payload}`;
    const webLink = `https://t.me/${buser}?start=${payload}`;

    if(type === 'fail') btn.classList.add('btn-fail');

    btn.onclick = () => {
      // Direct deep link trigger
      window.location.replace(deepLink);

      if (tg && tg.openTelegramLink) {
        tg.openTelegramLink(webLink);
      }

      // Close WebApp instantly
      setTimeout(() => { if(tg) tg.close(); }, 100);
    };
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const bid = params.get('botid'), tid = params.get('tgid'), buser = params.get('botuser');
    
    const statusEl = document.getElementById('status'), loadEl = document.getElementById('loader'), iconEl = document.getElementById('icon'), subEl = document.getElementById('subtext');

    if(!bid || !tid || !buser) { statusEl.textContent = "Error"; return; }

    const hid = await getHID();
    try {
      const res = await fetch(`/api/check?botid=${bid}&tgid=${tid}&deviceid=${hid}`);
      const data = await res.json();

      loadEl.style.display = 'none';
      iconEl.style.display = 'block';

      if(data.status === "success") {
        iconEl.textContent = "✓"; iconEl.className = "icon success";
        statusEl.textContent = "Verified";
        subEl.textContent = "Hardware scan passed.";
        setupButton('success', buser);
      } else {
        iconEl.textContent = "✕"; iconEl.className = "icon fail";
        statusEl.textContent = "Identity Alert";
        subEl.textContent = data.message || "Hardware mismatch detected.";
        setupButton('fail', buser);
      }
    } catch(e) { statusEl.textContent = "Server Error"; loadEl.style.display='none'; }
  }

  init();
</script>
</body>
</html>
