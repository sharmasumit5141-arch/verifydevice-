<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Verify</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4ff; --card: #ffffff; --blue: #1a6fff; --blue2: #0040cc;
      --cyan: #00c8ff; --success: #00b86e; --danger: #e03050;
      --warn: #f59e0b; --text: #0d1a33; --muted: #7a8fb0; --border: #d0dcf5;
    }
    html, body {
      height: 100%; background: var(--bg); font-family: 'Rajdhani', sans-serif;
      color: var(--text); display: flex; align-items: center;
      justify-content: center; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(26,111,255,0.12) 1px, transparent 1px);
      background-size: 28px 28px; pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; top: -120px; left: 50%;
      transform: translateX(-50%); width: 500px; height: 300px;
      background: radial-gradient(ellipse, rgba(26,111,255,0.16) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .card {
      position: relative; z-index: 1; background: var(--card);
      border: 1.5px solid var(--border); border-radius: 24px;
      padding: 34px 30px 26px; width: 92%; max-width: 360px;
      box-shadow: 0 4px 32px rgba(26,111,255,0.10), 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--blue2), var(--cyan), var(--blue), var(--cyan), var(--blue2));
      background-size: 300% 100%; animation: shimmer 2.5s linear infinite;
    }
    @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: 300% 0; } }
    .header { display: flex; align-items: center; gap: 13px; margin-bottom: 20px; }
    .shield {
      width: 50px; height: 50px; border-radius: 14px;
      background: linear-gradient(135deg, #e4edff, #ccd9ff);
      border: 1.5px solid #b8ccff; display: flex; align-items: center;
      justify-content: center; font-size: 24px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(26,111,255,0.15);
    }
    .header-text h1 { font-size: 19px; font-weight: 700; color: var(--text); line-height: 1.15; }
    .header-text p { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-top: 3px; }
    .scanline-wrap {
      position: relative; height: 4px; background: #e8eeff;
      border-radius: 99px; margin-bottom: 20px; overflow: hidden;
    }
    .scanline {
      position: absolute; top: 0; left: -50%; width: 50%; height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent 0%, var(--cyan) 40%, var(--blue) 60%, var(--cyan) 80%, transparent 100%);
      box-shadow: 0 0 10px var(--cyan), 0 0 20px rgba(26,111,255,0.5);
      animation: scanMove 1.8s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    .scanline.fast { animation-duration: 0.38s !important; }
    .scanline.done-success { animation: none !important; left: 0; width: 100%; background: linear-gradient(90deg, var(--success), #00ffaa, var(--success)); box-shadow: 0 0 14px rgba(0,184,110,0.7); }
    .scanline.done-fail    { animation: none !important; left: 0; width: 100%; background: var(--danger); box-shadow: 0 0 14px rgba(224,48,80,0.7); }
    .scanline.done-warn    { animation: none !important; left: 0; width: 100%; background: var(--warn); box-shadow: 0 0 14px rgba(245,158,11,0.7); }
    @keyframes scanMove { 0% { left: -50%; } 100% { left: 150%; } }
    .steps { display: flex; flex-direction: column; gap: 8px; }
    .step {
      display: flex; align-items: center; gap: 11px; padding: 11px 13px;
      border-radius: 12px; border: 1.5px solid var(--border);
      background: #f8faff; transition: all 0.35s ease;
    }
    .step.active { border-color: rgba(26,111,255,0.4); background: rgba(26,111,255,0.05); box-shadow: 0 0 0 3px rgba(26,111,255,0.07); }
    .step.done   { border-color: rgba(0,184,110,0.35); background: rgba(0,184,110,0.05); }
    .step.fail   { border-color: rgba(224,48,80,0.35); background: rgba(224,48,80,0.05); }
    .step.warn   { border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.05); }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccd6f0; flex-shrink: 0; transition: all 0.35s; }
    .step.active .step-dot { background: var(--blue); box-shadow: 0 0 0 3px rgba(26,111,255,0.2); animation: dotPulse 1s ease infinite; }
    .step.done .step-dot   { background: var(--success); animation: none; box-shadow: none; }
    .step.fail .step-dot   { background: var(--danger); animation: none; box-shadow: none; }
    .step.warn .step-dot   { background: var(--warn); animation: none; box-shadow: none; }
    @keyframes dotPulse { 0%,100% { box-shadow: 0 0 0 3px rgba(26,111,255,0.22); } 50% { box-shadow: 0 0 0 6px rgba(26,111,255,0.08); } }
    .step-info { flex: 1; }
    .step-title { font-size: 13px; font-weight: 700; color: var(--text); }
    .step-sub   { font-size: 10px; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-top: 1px; }
    .step-tag { font-size: 10px; font-family: 'Share Tech Mono', monospace; padding: 3px 9px; border-radius: 99px; font-weight: 600; white-space: nowrap; }
    .tag-wait    { background: #eef1f8; color: var(--muted); }
    .tag-running { background: rgba(26,111,255,0.1); color: var(--blue); }
    .tag-done    { background: rgba(0,184,110,0.1); color: var(--success); }
    .tag-fail    { background: rgba(224,48,80,0.1); color: var(--danger); }
    .tag-warn    { background: rgba(245,158,11,0.1); color: var(--warn); }
    .spin { width: 11px; height: 11px; border: 2px solid rgba(26,111,255,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spinning 0.55s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spinning { to { transform: rotate(360deg); } }
    .result-field { display: none; border-radius: 14px; padding: 16px 14px 14px; border: 1.5px solid; margin-top: 12px; animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .result-field.success { border-color: rgba(0,184,110,0.3); background: linear-gradient(135deg, rgba(0,184,110,0.06), rgba(0,255,150,0.03)); }
    .result-field.fail    { border-color: rgba(224,48,80,0.3); background: linear-gradient(135deg, rgba(224,48,80,0.06), rgba(255,80,80,0.03)); }
    .result-field.warn    { border-color: rgba(245,158,11,0.3); background: linear-gradient(135deg, rgba(245,158,11,0.06), rgba(255,200,0,0.03)); }
    .result-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .result-icon { width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .success .result-icon { background: rgba(0,184,110,0.12); }
    .fail    .result-icon { background: rgba(224,48,80,0.12); }
    .warn    .result-icon { background: rgba(245,158,11,0.12); }
    .result-head { font-size: 15px; font-weight: 700; }
    .success .result-head { color: var(--success); }
    .fail    .result-head { color: var(--danger); }
    .warn    .result-head { color: var(--warn); }
    .result-desc { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-top: 1px; }
    .result-rows { display: flex; flex-direction: column; gap: 5px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.07); }
    .rrow { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-family: 'Share Tech Mono', monospace; }
    .rkey { color: var(--muted); }
    .rval { font-weight: 700; padding: 2px 8px; border-radius: 6px; font-size: 10px; }
    .v-green  { background: rgba(0,184,110,0.12); color: var(--success); }
    .v-red    { background: rgba(224,48,80,0.12);  color: var(--danger); }
    .v-yellow { background: rgba(245,158,11,0.12); color: var(--warn); }
    .v-blue   { background: rgba(26,111,255,0.12); color: var(--blue); }
    .close-note { text-align: center; font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-top: 14px; opacity: 0.6; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="shield">🔐</div>
    <div class="header-text">
      <h1>Human Verification</h1>
      <p>AUTO-SCANNING DEVICE...</p>
    </div>
  </div>
  <div class="scanline-wrap">
    <div class="scanline" id="scanline"></div>
  </div>
  <div class="steps">
    <div class="step" id="s1">
      <div class="step-dot"></div>
      <div class="step-info">
        <div class="step-title">Network & IP Check</div>
        <div class="step-sub">vpn / proxy detection</div>
      </div>
      <span class="step-tag tag-wait" id="t1">WAIT</span>
    </div>
    <div class="step" id="s2">
      <div class="step-dot"></div>
      <div class="step-info">
        <div class="step-title">Device Fingerprint</div>
        <div class="step-sub">unique device id scan</div>
      </div>
      <span class="step-tag tag-wait" id="t2">WAIT</span>
    </div>
    <div class="step" id="s3">
      <div class="step-dot"></div>
      <div class="step-info">
        <div class="step-title">Telegram ID Check</div>
        <div class="step-sub">tg user identity verify</div>
      </div>
      <span class="step-tag tag-wait" id="t3">WAIT</span>
    </div>
    <div class="step" id="s4">
      <div class="step-dot"></div>
      <div class="step-info">
        <div class="step-title">Submit to Server</div>
        <div class="step-sub">sending result to bot</div>
      </div>
      <span class="step-tag tag-wait" id="t4">WAIT</span>
    </div>
  </div>
  <div class="result-field" id="resultField">
    <div class="result-top">
      <div class="result-icon" id="rIcon">✅</div>
      <div>
        <div class="result-head" id="rHead">Verified!</div>
        <div class="result-desc" id="rDesc">Identity confirmed.</div>
      </div>
    </div>
    <div class="result-rows" id="rRows"></div>
  </div>
  <p class="close-note" id="closeNote">Scanning... please wait</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
<script>
  const params      = new URLSearchParams(window.location.search);
  const BOT_ID      = params.get("bot_id") || "";
  const CALLBACK_URL = params.get("callback_url") || "";
  const SERVER      = "https://verifydevice.vercel.app";

  const scanline = document.getElementById("scanline");
  const sleep    = ms => new Promise(r => setTimeout(r, ms));

  function setStep(id, state) {
    const s = document.getElementById("s" + id);
    const t = document.getElementById("t" + id);
    s.className = "step " + state;
    if (state === "active") {
      t.innerHTML = '<span class="spin"></span>';
      t.className = "step-tag tag-running";
    } else if (state === "done") {
      t.textContent = "DONE";
      t.className = "step-tag tag-done";
    } else if (state === "fail") {
      t.textContent = "FAIL";
      t.className = "step-tag tag-fail";
    } else if (state === "warn") {
      t.textContent = "WARN";
      t.className = "step-tag tag-warn";
    }
  }

  function row(key, val, cls) {
    return '<div class="rrow"><span class="rkey">' + key + '</span><span class="rval ' + cls + '">' + val + '</span></div>';
  }

  function showResult(type, emoji, head, desc, rows) {
    const f = document.getElementById("resultField");
    f.className = "result-field " + type;
    f.style.display = "block";
    document.getElementById("rIcon").textContent = emoji;
    document.getElementById("rHead").textContent = head;
    document.getElementById("rDesc").textContent = desc;
    document.getElementById("rRows").innerHTML   = rows;
    document.getElementById("closeNote").textContent = "You can close this window now.";
  }

  async function run() {
    await sleep(500);

    // ── Step 1 — Network ──
    setStep(1, "active");
    await sleep(1000);
    setStep(1, "done");

    // ── Step 2 — Fingerprint ──
    setStep(2, "active");
    scanline.classList.add("fast");
    await sleep(200);

    let fingerprint = "";
    try {
      const fp  = await FingerprintJS.load();
      const res = await fp.get();
      fingerprint = res.visitorId;
    } catch(e) {
      fingerprint = Math.random().toString(36).slice(2, 18);
    }

    setStep(2, "done");
    await sleep(350);

    // ── Step 3 — Telegram ID ──
    setStep(3, "active");
    await sleep(500);

    const tgUser    = window.Telegram && window.Telegram.WebApp
                      && window.Telegram.WebApp.initDataUnsafe
                      && window.Telegram.WebApp.initDataUnsafe.user;
    const tgUserId  = tgUser && tgUser.id ? String(tgUser.id) : "";

    setStep(3, "done");
    await sleep(300);

    // ── Step 4 — Submit ──
    setStep(4, "active");
    await sleep(300);

    try {
      const resp = await fetch(SERVER + "/api/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          bot_id:       BOT_ID,
          callback_url: CALLBACK_URL,
          fingerprint:  fingerprint,
          tg_user_id:   tgUserId,
        })
      });

      const data   = await resp.json();
      const result = data.result || "success";

      // ── Results ──
      if (result === "already_verified") {
        setStep(4, "warn");
        scanline.className = "scanline done-warn";
        showResult("warn", "🙄", "Already Verified!",
          "You verified before. Return to bot.",
          row("BOT ID",     "MATCHED",          "v-yellow") +
          row("BROWSER ID", "SAME",             "v-yellow") +
          row("TELEGRAM ID","SAME",             "v-yellow") +
          row("STATUS",     "ALREADY VERIFIED", "v-yellow")
        );

      } else if (result === "fail") {
        setStep(4, "fail");
        scanline.className = "scanline done-fail";
        showResult("fail", "🚫", "Verification Failed!",
          "Device or VPN issue detected.",
          row("BOT ID",     "MATCHED",   "v-yellow") +
          row("BROWSER ID", "SAME",      "v-red") +
          row("TELEGRAM ID","DIFFERENT", "v-red") +
          row("STATUS",     "BLOCKED",   "v-red")
        );

      } else if (result === "success") {
        setStep(4, "done");
        scanline.className = "scanline done-success";
        showResult("success", "✅", "Verified Successfully!",
          "Identity confirmed. Return to the bot.",
          row("BOT ID",     "MATCHED", "v-green") +
          row("BROWSER ID", "NEW",     "v-green") +
          row("TELEGRAM ID","NEW",     "v-green") +
          row("STATUS",     "VERIFIED","v-green")
        );

      } else {
        setStep(4, "done");
        scanline.className = "scanline done-success";
        showResult("success", "✅", "Done!", "Verification complete.",
          row("STATUS", "OK", "v-green")
        );
      }

      setTimeout(function() {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.close();
        }
      }, 2800);

    } catch(e) {
      setStep(4, "fail");
      scanline.className = "scanline done-fail";
      showResult("fail", "❌", "Connection Error",
        "Could not reach server. Please try again.",
        row("ERROR", "TIMEOUT", "v-red")
      );
    }
  }

  run();
</script>
</body>
</html>
