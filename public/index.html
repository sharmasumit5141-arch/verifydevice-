<!DOCTYPE html>
<html>
<head>
    <title>Device Verification</title>
    <script>
        async function getFingerprint() {
            // Simple Canvas Fingerprint
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = "top";
            ctx.font = "14px 'Arial'";
            ctx.fillText("Verification_Hash_1.0", 2, 2);
            return btoa(canvas.toDataURL()); 
        }

        async function verify() {
            const urlParams = new URLSearchParams(window.location.search);
            const botid = urlParams.get('botid');
            const tgid = urlParams.get('tgid');
            const deviceid = await getFingerprint();

            if(!botid || !tgid) {
                document.body.innerHTML = "Invalid URL Parameters.";
                return;
            }

            const response = await fetch(`/api/check?botid=${botid}&tgid=${tgid}&deviceid=${encodeURIComponent(deviceid)}`);
            const result = await response.json();

            if(result.success) {
                document.body.innerHTML = "<h1 style='color:green'>Success! You can return to the bot.</h1>";
            } else {
                document.body.innerHTML = `<h1 style='color:red'>Fail: ${result.message}</h1>`;
            }
        }
        window.onload = verify;
    </script>
</head>
<body>
    <h1>Verifying your device...</h1>
</body>
</html>
