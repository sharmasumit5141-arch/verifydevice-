<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Verification</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  width: 320px;
}
.status { margin-top: 20px; }
.success { color: #22c55e; }
.fail { color: #ef4444; }
.loading { color: #38bdf8; }
.loader {
  border: 4px solid #334155;
  border-top: 4px solid #38bdf8;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Device Verification</h2>
  <div class="loader" id="loader"></div>
  <div class="status loading" id="status">Checking...</div>
</div>

<script>
function getParam(name) {
  return new URL(window.location.href).searchParams.get(name);
}

const botid = getParam("botid");
const tgid = getParam("tgid");
const username = getParam("username") || "user";

const statusEl = document.getElementById("status");
const loader = document.getElementById("loader");

if (!botid || !tgid) {
  loader.style.display = "none";
  statusEl.innerHTML = "❌ Invalid URL (botid/tgid missing)";
  statusEl.className = "status fail";
} else {

  fetch(`/api/verify?botid=${botid}&tgid=${tgid}&username=${username}`)
    .then(async res => {
      const text = await res.text();

      // 🔥 try parse JSON safely
      try {
        return JSON.parse(text);
      } catch {
        throw new Error("Invalid JSON: " + text);
      }
    })
    .then(data => {

      loader.style.display = "none";

      console.log("API Response:", data); // 👈 debug console

      if (data.status === "verified" || data.status === "success") {
        statusEl.innerHTML = `✅ ${data.message}<br><br><small>${data.deviceId}</small>`;
        statusEl.className = "status success";
      }

      else if (data.status === "fail") {
        statusEl.innerHTML = `❌ ${data.message || data.reason}`;
        statusEl.className = "status fail";
      }

      else if (data.status === "not_verified" || data.status === "pending") {
        statusEl.innerHTML = `⏳ ${data.message}`;
        statusEl.className = "status loading";
      }

      else {
        statusEl.innerHTML = `⚠️ Unknown response<br><small>${JSON.stringify(data)}</small>`;
        statusEl.className = "status fail";
      }

    })
    .catch(err => {
      loader.style.display = "none";

      statusEl.innerHTML = `❌ Error: ${err.message}`;
      statusEl.className = "status fail";

      console.error("Fetch Error:", err);
    });
}
</script>

</body>
</html>
