<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIO Secure</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet">
  <style>
    body { background: #0f172a; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #fff; }
    .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; text-align: center; width: 80%; }
    .loader { width: 40px; height: 40px; border: 3px solid #334155; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div id="loader" class="loader"></div>
  <div id="status">Hardware Check...</div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  async function getHID() {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl');
    const debug = gl.getExtension('WEBGL_debug_renderer_info');
    const renderer = debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "unknown";
    const traits = [renderer, screen.width+"x"+screen.height, navigator.hardwareConcurrency].join('|');
    const encode = new TextEncoder().encode(traits);
    const hash = await crypto.subtle.digest('SHA-256', encode);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // --- YE HAI FORCE REDIRECT BINA CLICK KE ---
  function instantRedirect(buser) {
    const deepLink = `tg://resolve?domain=${buser}&start=verifyidfailed`;
    
    // Sabse sakt method: Multiple triggers
    window.location.replace(deepLink);
    window.location.href = deepLink;
    
    if (tg && tg.openTelegramLink) {
        tg.openTelegramLink(`https://t.me/${buser}?start=verifyidfailed`);
    }

    // Webapp close karke seedha bot ke chat pe phenko
    setTimeout(() => { if(tg) tg.close(); }, 300);
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const bid = params.get('botid'), tid = params.get('tgid'), buser = params.get('botuser');

    if(!bid || !tid || !buser) return;

    const hid = await getHID();
    try {
      const res = await fetch(`/api/check?botid=${bid}&tgid=${tid}&deviceid=${hid}`);
      const data = await res.json();

      if(data.status === "success") {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('status').innerHTML = "âś“ Verified";
      } else {
        // FAIL HOTE HI BINA PUCHE REDIRECT
        document.getElementById('status').innerText = "Redirecting...";
        instantRedirect(buser);
      }
    } catch(e) { console.log(e); }
  }

  init();
</script>
</body>
</html>
