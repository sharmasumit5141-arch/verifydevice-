<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifying...</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue:      #2563eb;
      --blue-light:#eff6ff;
      --blue-mid:  #bfdbfe;
      --blue-dark: #1d4ed8;
      --white:     #ffffff;
      --gray:      #6b7280;
      --gray-light:#f9fafb;
      --text:      #111827;
    }

    body {
      min-height: 100vh;
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* Subtle background gradient */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #dbeafe 0%, transparent 70%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 32px;
      text-align: center;
    }

    /* ── Ring loader ── */
    .ring-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
    }

    .ring-outer {
      border-top-color: var(--blue);
      border-right-color: var(--blue-mid);
      animation: spin 1.1s linear infinite;
    }

    .ring-inner {
      inset: 14px;
      border-top-color: transparent;
      border-bottom-color: var(--blue);
      border-left-color: var(--blue-mid);
      animation: spin 0.75s linear infinite reverse;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .ring-icon {
      width: 36px;
      height: 36px;
      background: var(--blue-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-icon svg {
      width: 18px;
      height: 18px;
      color: var(--blue);
    }

    /* Success / fail icon (hidden initially) */
    .result-icon {
      display: none;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-icon.success { background: #eff6ff; }
    .result-icon.fail    { background: #fef2f2; }

    /* ── Ticker line ── */
    .ticker-wrap {
      width: 300px;
      max-width: 90vw;
      overflow: hidden;
      position: relative;
    }

    .ticker-wrap::before,
    .ticker-wrap::after {
      content: '';
      position: absolute; top: 0; bottom: 0;
      width: 32px; z-index: 2;
    }
    .ticker-wrap::before { left: 0;  background: linear-gradient(to right, white, transparent); }
    .ticker-wrap::after  { right: 0; background: linear-gradient(to left,  white, transparent); }

    .ticker-track {
      display: flex;
      gap: 48px;
      animation: ticker 6s linear infinite;
      white-space: nowrap;
    }

    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .ticker-item {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--gray);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ticker-dot {
      width: 5px; height: 5px;
      background: var(--blue);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* ── Status message ── */
    .status-msg {
      font-size: 15px;
      font-weight: 400;
      color: var(--gray);
      letter-spacing: 0.2px;
      min-height: 22px;
      transition: all 0.4s ease;
    }

    .status-msg.success { color: var(--blue-dark); font-weight: 500; }
    .status-msg.fail    { color: #dc2626; font-weight: 500; }

    /* ── Progress bar ── */
    .progress-bar {
      width: 200px;
      height: 2px;
      background: var(--blue-mid);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--blue);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--gray);
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer-logo {
      font-weight: 500;
      color: var(--blue);
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Ring loader -->
  <div id="ringWrap" class="ring-wrap">
    <div class="ring ring-outer"></div>
    <div class="ring ring-inner"></div>
    <div class="ring-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
  </div>

  <!-- Result icon (shown after) -->
  <div id="resultIcon" class="result-icon"></div>

  <!-- Status text -->
  <div class="status-msg" id="statusMsg">Verifying your access...</div>

  <!-- Progress bar -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Ticker -->
  <div class="ticker-wrap">
    <div class="ticker-track" id="tickerTrack">
      <span class="ticker-item"><span class="ticker-dot"></span>Connecting to server</span>
      <span class="ticker-item"><span class="ticker-dot"></span>Checking device registry</span>
      <span class="ticker-item"><span class="ticker-dot"></span>Validating session</span>
      <span class="ticker-item"><span class="ticker-dot"></span>Securing channel</span>
      <span class="ticker-item"><span class="ticker-dot"></span>Connecting to server</span>
      <span class="ticker-item"><span class="ticker-dot"></span>Checking device registry</span>
      <span class="ticker-item"><span class="ticker-dot"></span>Validating session</span>
      <span class="ticker-item"><span class="ticker-dot"></span>Securing channel</span>
    </div>
  </div>

</div>

<!-- Footer -->
<div class="footer">
  Powered by <span class="footer-logo">Unio Wallet</span> ✅
</div>

<script>
  const params   = new URLSearchParams(window.location.search);
  const botid    = params.get('botid');
  const tgid     = params.get('tgid');
  const deviceid = params.get('deviceid');

  const progEl   = document.getElementById('progressFill');
  const msgEl    = document.getElementById('statusMsg');
  const ringWrap = document.getElementById('ringWrap');
  const resultEl = document.getElementById('resultIcon');
  const ticker   = document.getElementById('tickerTrack');

  function showResult(type, msg) {
    // Hide ring
    ringWrap.style.display = 'none';

    // Show icon
    resultEl.style.display = 'flex';
    if (type === 'success') {
      resultEl.className = 'result-icon success';
      resultEl.textContent = '✓';
      msgEl.className = 'status-msg success';
    } else {
      resultEl.className = 'result-icon fail';
      resultEl.textContent = '✕';
      msgEl.className = 'status-msg fail';
    }

    msgEl.textContent = msg;
    progEl.style.width = '100%';

    // Stop ticker
    ticker.style.animationPlayState = 'paused';
    ticker.style.opacity = '0.4';
  }

  async function checkDevice() {
    if (!botid || !tgid || !deviceid) {
      showResult('fail', 'Invalid verification link');
      return;
    }

    let prog = 0;
    const timer = setInterval(() => {
      prog = Math.min(prog + 5, 85);
      progEl.style.width = prog + '%';
    }, 120);

    try {
      const res  = await fetch(`/api/check?botid=${encodeURIComponent(botid)}&tgid=${encodeURIComponent(tgid)}&deviceid=${encodeURIComponent(deviceid)}`);
      const data = await res.json();
      clearInterval(timer);

      const successResults = ['same_device'];
      if (successResults.includes(data.result)) {
        showResult('success', data.message || 'Verified successfully');
      } else {
        showResult('fail', data.message || 'Verification failed');
      }
    } catch (e) {
      clearInterval(timer);
      showResult('fail', 'Connection failed — please try again');
    }
  }

  setTimeout(checkDevice, 800);
</script>
</body>
</html>
