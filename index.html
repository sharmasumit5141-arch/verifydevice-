<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .user-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-avatar-placeholder {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .user-name { font-size: 16px; font-weight: 700; color: #fff; }
        .user-id { font-size: 13px; color: #888; margin-top: 2px; }
        .status-badge {
            background: #2a2a4a;
            color: #a78bfa;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .status-badge.success { background: rgba(0,200,100,0.15); color: #00c864; }
        .status-badge.failed { background: rgba(255,50,50,0.15); color: #ff4444; }
        .main-card {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 40px 30px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .shield-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 38px;
        }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 30px; line-height: 1.6; }
        .steps { text-align: left; margin-bottom: 25px; }
        .step { display: flex; align-items: center; gap: 14px; padding: 10px 0; }
        .step-icon {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; flex-shrink: 0;
            background: #2a2a4a; color: #888;
        }
        .step-icon.done { background: #00c864; color: #fff; }
        .step-icon.loading { background: #6c63ff; color: #fff; }
        .step-icon.error { background: #ff4444; color: #fff; }
        .step-text { font-size: 15px; color: #666; font-weight: 500; }
        .step-text.active { color: #fff; }
        .progress-bar {
            height: 4px; background: #2a2a4a;
            border-radius: 10px; overflow: hidden; margin-bottom: 25px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c63ff, #a78bfa);
            border-radius: 10px; width: 0%;
            transition: width 0.5s ease;
        }
        .btn {
            width: 100%; padding: 16px; border: none;
            border-radius: 14px; font-size: 16px; font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            color: #fff; transition: opacity 0.2s; display: none;
        }
        .btn:active { opacity: 0.8; }
        .powered { margin-top: 16px; font-size: 12px; color: #555; }
        .powered span { color: #6c63ff; font-weight: 700; }
        .loader {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="user-card">
    <div class="user-info">
        <div class="user-avatar-placeholder" id="avatarEl">?</div>
        <div>
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-id" id="userId">ID: ...</div>
        </div>
    </div>
    <div class="status-badge" id="statusBadge">VERIFYING</div>
</div>

<div class="main-card">
    <div class="shield-icon">🛡️</div>
    <h1>Device Verification</h1>
    <p class="subtitle" id="subtitle">Verifying your device automatically. Please wait...</p>

    <div class="steps">
        <div class="step">
            <div class="step-icon" id="s1">1</div>
            <div class="step-text" id="t1">Collecting device info</div>
        </div>
        <div class="step">
            <div class="step-icon" id="s2">2</div>
            <div class="step-text" id="t2">Generating fingerprint</div>
        </div>
        <div class="step">
            <div class="step-icon" id="s3">3</div>
            <div class="step-text" id="t3">Verifying with server</div>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <button class="btn" id="retryBtn">Retry</button>
    <div class="powered">Powered by <span>UNIO WALLET</span> ✅</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const tgUser = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : null;
    const tgId = tgUser ? String(tgUser.id) : null;
    const tgName = tgUser ? (tgUser.first_name + (tgUser.last_name ? " " + tgUser.last_name : "")) : "User";
    const tgPhoto = tgUser ? (tgUser.photo_url || "") : "";

    const urlParams = new URLSearchParams(window.location.search);
    const botId = urlParams.get("botid") || "default";
    const BOT_USERNAME = urlParams.get("bot") || "Unio_firstdbot";

    const API_URL = "https://YOUR_VERCEL_APP.vercel.app/api/check";

    // User card
    document.getElementById("userName").textContent = tgName;
    document.getElementById("userId").textContent = "ID: " + (tgId || "Unknown");

    if (tgPhoto) {
        const img = document.createElement("img");
        img.src = tgPhoto;
        img.className = "user-avatar";
        document.getElementById("avatarEl").replaceWith(img);
    } else {
        document.getElementById("avatarEl").textContent = tgName ? tgName[0].toUpperCase() : "?";
    }

    function getDeviceId() {
        const scr = window.screen.width + "x" + window.screen.height;
        const lang = navigator.language || "en";
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";
        const cores = String(navigator.hardwareConcurrency || 0);
        const mem = String(navigator.deviceMemory || 0);
        const touch = String(navigator.maxTouchPoints || 0);
        const depth = String(window.screen.colorDepth || 0);
        const raw = scr + lang + tz + cores + mem + touch + depth;
        let hash = 0;
        for (let i = 0; i < raw.length; i++) {
            hash = ((hash << 5) - hash) + raw.charCodeAt(i);
            hash = hash & hash;
        }
        return "DEV" + Math.abs(hash).toString(36).toUpperCase();
    }

    function setStep(n, state) {
        const icon = document.getElementById("s" + n);
        const text = document.getElementById("t" + n);
        if (state === "done") {
            icon.className = "step-icon done";
            icon.textContent = "✓";
            text.className = "step-text active";
        } else if (state === "loading") {
            icon.className = "step-icon loading";
            icon.innerHTML = "<span class='loader'></span>";
            text.className = "step-text active";
        } else if (state === "error") {
            icon.className = "step-icon error";
            icon.textContent = "✕";
            text.className = "step-text active";
        }
    }

    function setProgress(pct) {
        document.getElementById("progressFill").style.width = pct + "%";
    }

    function sleep(ms) {
        return new Promise(function(r) { setTimeout(r, ms); });
    }

    function showResult(status, deviceId) {
        const badge = document.getElementById("statusBadge");
        const subtitle = document.getElementById("subtitle");

        if (status === "success" || status === "already_mine") {
            badge.className = "status-badge success";
            badge.textContent = "VERIFIED";
            subtitle.textContent = status === "success" ? "Device verified! Redirecting..." : "Already verified! Redirecting...";
            setProgress(100);
            setTimeout(function() {
                window.location.href = "https://t.me/" + BOT_USERNAME + "?start=verifyid" + deviceId + "_" + tgId;
            }, 1500);

        } else if (status === "failed") {
            badge.className = "status-badge failed";
            badge.textContent = "FAILED";
            subtitle.textContent = "Yeh device kisi aur account se linked hai!";
            setStep(3, "error");
            setProgress(100);
            setTimeout(function() {
                window.location.href = "https://t.me/" + BOT_USERNAME + "?start=verifyidfail_" + deviceId + "_" + tgId;
            }, 1500);

        } else {
            badge.textContent = "ERROR";
            subtitle.textContent = "Server error! Retry karo.";
            document.getElementById("retryBtn").style.display = "block";
        }
    }

    async function startVerification() {
        if (!tgId) {
            document.getElementById("subtitle").textContent = "Telegram se kholo!";
            document.getElementById("statusBadge").className = "status-badge failed";
            document.getElementById("statusBadge").textContent = "ERROR";
            return;
        }

        document.getElementById("retryBtn").style.display = "none";
        document.getElementById("statusBadge").className = "status-badge";
        document.getElementById("statusBadge").textContent = "VERIFYING";
        document.getElementById("subtitle").textContent = "Verifying your device automatically. Please wait...";

        setStep(1, "loading"); setProgress(20);
        await sleep(800);
        setStep(1, "done");

        setStep(2, "loading"); setProgress(50);
        const deviceId = getDeviceId();
        await sleep(800);
        setStep(2, "done");

        setStep(3, "loading"); setProgress(75);

        try {
            const resp = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    device_id: deviceId,
                    tg_id: tgId,
                    tg_name: tgName,
                    bot_id: botId
                })
            });
            const data = await resp.json();
            setStep(3, "done");
            setProgress(90);
            await sleep(500);
            showResult(data.status, deviceId);
        } catch (err) {
            setStep(3, "error");
            showResult("error", deviceId);
        }
    }

    document.getElementById("retryBtn").onclick = function() { startVerification(); };
    startVerification();
</script>
</body>
</html>
